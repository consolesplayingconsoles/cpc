# DreamPi DNS. dnsmasq listens on :53 and forwards the Dreamcast's lookups to
# the game-server DNS, so revived servers (Dreamcast Live etc.) resolve to the
# right IPs. Deployed to /etc/dnsmasq.conf. The DC is handed this box as its DNS
# via the ppp0 `ms-dns` option (set by the daemon at connect time).
domain-needed
bogus-priv
no-resolv
server=46.101.91.123
server=209.50.50.129
no-hosts
cache-size=500
log-queries
# The daemon downloads a fresh server list to /etc/dnsmasq.d/dreampi.conf at
# runtime; conf-dir makes dnsmasq load it.
conf-dir=/etc/dnsmasq.d/,*.conf
