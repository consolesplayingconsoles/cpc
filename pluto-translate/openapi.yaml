openapi: 3.0.3
info:
  title: CPC Translation API
  version: 0.1.0
  description: >
    Runs ON the Batocera node (the `pluto-translate` payload), where the Dreamcast
    GDIs and buildgdi live. Pluto calls it over HTTP for ROM-text discovery and
    extraction instead of SSH-ing a script per request. Not a Pluto instance;
    deployed via `deploy.sh nodes/local/batocera/.env` and kept up by
    batocera-services. Endpoints below are the current surface; per-file extract
    and streaming are planned.
servers:
  - url: http://{host}:7711
    variables:
      host:
        default: 192.168.68.57
        description: Batocera node HOST_IP
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  service: { type: string, example: cpc-translate }
                  port: { type: integer, example: 7711 }
  /meta:
    get:
      summary: Disc metadata from IP.BIN (title, region, product #, version, date)
      description: >
        Reads the GD-ROM bootstrap (IP.BIN, at the high-density data track LBA
        45000) -- a few-KB read, no extract, so it's instant. `titleHex` is the raw
        title (shift_jis for JP games); `title` is the ASCII decode.
      parameters:
        - name: path
          in: query
          required: true
          description: Absolute GDI path on the box.
          schema: { type: string }
      responses:
        '200':
          description: Disc metadata
        '400':
          description: path query parameter missing
        '502':
          description: no bootstrap found / read error
  /systems:
    get:
      summary: Source roms systems (runs list-systems.sh)
      description: >
        Lists console systems that have originals to translate, one dir name per
        line under the SOURCE roms tree ($ROMS_SRC, default ~/roms -- NOT the
        Batocera-scanned /userdata/roms). Pluto proxies this to populate the system
        picker and cross-references it against the local console nodes.
      responses:
        '200':
          description: Source systems ({"systems":[...]})
        '502':
          description: list failed (script error on the box)
  /games:
    get:
      summary: Translatable games for a system (runs list-games.sh)
      description: >
        Lists translatable discs under $ROMS_SRC/<system> on the box (the source
        roms tree, default ~/roms) -- GDI only, the pipeline is GDI-native. Each
        game is {name, path}; the path then feeds /meta and /sources. Pluto proxies
        this to populate the game picker.
      parameters:
        - name: system
          in: query
          required: true
          description: Console system / roms folder name (e.g. dreamcast).
          schema: { type: string }
      responses:
        '200':
          description: Games for the system
        '400':
          description: system query parameter missing
        '502':
          description: list failed (script error on the box)
  /sources:
    get:
      summary: Discover translatable text files on a disc (the workbench "tabs")
      description: >
        Extracts the disc once (cached on the box), scans every file by Shift-JIS
        density, and returns the ones that read as real text (kana ratio >= ~45%).
        Graphics, audio and video blobs are dropped. An empty `sources` list means
        no text was found (the only real failure).
      parameters:
        - name: path
          in: query
          required: true
          description: Absolute GDI path on the box.
          schema: { type: string }
          example: /userdata/roms/dreamcast/Boku Doraemon (Japan)/disc.gdi
      responses:
        '200':
          description: Ranked text files
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: array
                    items: { $ref: '#/components/schemas/Source' }
        '400':
          description: path query parameter missing
        '502':
          description: discovery failed (extract/scan error on the box)
  /extract:
    get:
      summary: Extract one discovered source's text blocks (from the cache)
      description: >
        Reads a source cached by a prior /sources call and runs the parser its
        `kind` names in sources.config.json (nullsplit / lines). Blocks carry raw
        Shift-JIS hex; the browser decodes them. No disc re-extraction.
      parameters:
        - name: path
          in: query
          required: true
          description: Absolute GDI path on the box (same one passed to /sources).
          schema: { type: string }
        - name: file
          in: query
          required: true
          description: The source's `safe` name from the /sources manifest.
          schema: { type: string }
          example: DOUGU_ITEMTBL.PAC
      responses:
        '200':
          description: Text blocks (offset, jpBytes, hex, speaker) + the kind/parser used
        '400':
          description: path or file missing
        '502':
          description: extraction failed / source not cached
  /measure:
    post:
      summary: Per-scene Catalan byte cost (the box-budget meter)
      description: >
        Runs the packer's `nullsplit.measure` on the posted blocks (each carrying its
        current `ca`) against the cached source, returning the real per-scene expansion
        the build will pay plus the per-line cost for the cumulative bar. Pluto proxies
        this to drive the translation tab's budget meter. Only SCP/nullsplit sources have
        per-scene boxes.
      parameters:
        - name: path
          in: query
          required: true
          description: Absolute GDI path on the box (same one passed to /sources).
          schema: { type: string }
        - name: file
          in: query
          required: true
          description: The source's `safe` name (a nullsplit source, e.g. STORY.PAC).
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                blocks:
                  type: array
                  items:
                    type: object
                    properties:
                      offset:  { type: string }
                      ca:      { type: string }
                      jpBytes: { type: integer }
      responses:
        '200':
          description: '{ used: {scene: bytes}, line: {offset: bytes} } per-scene total + per-line'
        '400':
          description: path or file missing
        '502':
          description: measure failed / source not cached
components:
  schemas:
    Source:
      type: object
      properties:
        file:
          type: string
          description: Original on-disc name (may contain literal backslashes).
          example: DOUGU\ITEMTBL.PAC
        safe:
          type: string
          description: Sanitized cache filename (backslashes/slashes flattened).
          example: DOUGU_ITEMTBL.PAC
        kind:
          type: string
          description: Typology guess (dialogue/menu/items/ui/chat/secret/readme/text) -- a starting point the operator refines.
          example: items
        kanaPct:
          type: integer
          description: Percent of Shift-JIS byte-pairs that are kana (text-ness signal).
          example: 74
        size:
          type: integer
          description: File size in bytes.
          example: 325632
        view:
          type: integer
          description: Server-driven tab position (0 = first), by typology/meaning. The array is already in this order.
          example: 2
        loadOrder:
          type: integer
          description: Server-driven fetch sequence (0 = load first). By size; separate from the array's VIEW order (by meaning).
          example: 1
