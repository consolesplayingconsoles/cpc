<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Pluto logo: a tilted orbit/network ring around the terracotta planet, with
       two nodes riding the orbit. Mirrors the header mark in App.vue. -->
  <rect width="24" height="24" rx="5" fill="#e8e8e6"/>
  <ellipse cx="12" cy="12" rx="10" ry="3.7" fill="none" stroke="#F5A623"
           stroke-width="1.4" opacity="0.5" transform="rotate(-22 12 12)"/>
  <circle cx="12" cy="12" r="5.2" fill="#F5A623"/>
  <circle cx="10.1" cy="10.1" r="1.8" fill="#fff" opacity="0.18"/>
  <circle cx="20.3" cy="8.4" r="1.5" fill="#F5A623"/>
  <circle cx="3.7" cy="15.6" r="1.5" fill="#F5A623"/>
</svg>
